# ============================================================
# Blog LAB — Nginx 配置
# 开发环境用 HTTP，生产环境取消注释 SSL 部分并配置证书
# ============================================================

# 隐藏 Nginx 版本号
server_tokens off;

# 限流区域（每个 IP 每秒 10 个请求）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# HTTP → HTTPS 重定向（生产环境取消注释）
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    # 开发环境监听 80
    listen 80;
    # 生产环境 SSL（取消注释上面 80→443 重定向，再取消注释下面这段）
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    server_name _;

    client_max_body_size 10M;

    # 安全头（后端中间件已加，Nginx 再加一道）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API（带限流）
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://server:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 支持长连接与流式响应（为未来 AI SSE 预留）
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # 静态资源缓存
    location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
}
