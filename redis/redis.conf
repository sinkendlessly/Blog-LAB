# ============ Redis 7 配置：RDB + AOF 混合持久化 ============

# 网络与保护
protected-mode no
port 6379
bind 0.0.0.0

# 密码（与 .env 中 REDIS_PASSWORD 一致，生产环境务必修改）
requirepass changeme_redis_password

# ============ RDB 快照 ============
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ============ AOF 追加日志 ============
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ============ 内存管理 ============
maxmemory 256mb
maxmemory-policy allkeys-lru

# ============ 其他 ============
timeout 0
tcp-keepalive 300
databases 16
